<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Noticias Geek Brasil</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging.js"></script>
  <style>
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:rgba(0,0,0,0.7);
      color:#fff;
    }
    header {
      background:rgba(0,0,0,0.7);
      padding:10px;
      text-align:center;
    }
    .btn {
      margin:5px;
      padding:10px 20px;
      background:rgba(0,0,0,0.7);
      color:#fff;
      border:none;
      cursor:pointer;
    }
    .settings {
      position:absolute;
      top:10px;
      right:10px;
      cursor:pointer;
    }
    #configPanel {
      display:none;
      position:fixed;
      top:0;
      right:0;
      width:250px;
      height:100%;
      background:rgba(0,0,0,0.7);
      padding:20px;
    }
    #banner {
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      text-align:center;
      padding:10px;
    }
    #cryptoBar {
      background:rgba(0,0,0,0.7);
      padding:10px;
      text-align:center;
    }
    #avatar {
      width:50px;
      height:50px;
      border-radius:50%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Noticias Geek Brasil</h1>
    <img id="avatar" src="" alt="Avatar">
    <span id="username"></span>
    <i class="fa-solid fa-gear settings" onclick="toggleConfig()">⚙️</i>
  </header>

  <!-- Botões de categorias -->
  <div>
    <button class="btn" onclick="abrirGames()">Games</button>
    <button class="btn" onclick="abrirFilmes()">Filmes</button>
    <button class="btn" onclick="abrirSeries()">Séries & Animes</button>
    <button class="btn" onclick="abrirFutebol()">Futebol</button>
    <button class="btn" onclick="abrirCripto()">Criptomoedas</button>
    <button class="btn" onclick="abrirTrailers()">Trailers da Semana</button>
  </div>

  <!-- Painel de Configurações -->
  <div id="configPanel">
    <h3>Configurações</h3>
    <label><input type="checkbox" id="notifCheck"> Notificações internas</label><br>
    <label><input type="checkbox" id="soundCheck"> Som de gol</label><br>
    <button onclick="toggleConfig()">Fechar</button>
  </div>

  <!-- Barra de Criptomoedas -->
  <div id="cryptoBar">Carregando preços de criptomoedas...</div>

  <!-- Banner fixo -->
  <div id="banner">Banner fixo - Noticias Geek Brasil</div>

<script>
  // Firebase Config (substitua pelas suas chaves reais)
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_AUTH_DOMAIN",
    projectId: "SEU_PROJECT_ID",
    messagingSenderId: "SEU_SENDER_ID",
    appId: "SEU_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);

  // Login Firebase
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.onAuthStateChanged(user => {
    if(user){
      document.getElementById("username").textContent = user.displayName;
      document.getElementById("avatar").src = user.photoURL;
    } else {
      auth.signInWithPopup(provider);
    }
  });

  // Configurações
  function toggleConfig(){
    const panel = document.getElementById("configPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }

  // Botões de categorias
  function abrirGames(){ window.location.href="games.html"; }
  function abrirFilmes(){ window.location.href="filmes.html"; }
  function abrirSeries(){ window.location.href="series.html"; }
  function abrirFutebol(){ window.location.href="futebol.html"; }
  function abrirCripto(){ window.location.href="cripto.html"; }
  function abrirTrailers(){ window.location.href="trailers.html"; }

  // Barra de Criptomoedas
  async function atualizarCripto(){
    try{
      const resp = await fetch("https://api.coindesk.com/v1/bpi/currentprice.json");
      const data = await resp.json();
      document.getElementById("cryptoBar").textContent =
        "BTC: $" + data.bpi.USD.rate + " | Atualizado";
    }catch(e){
      document.getElementById("cryptoBar").textContent = "Erro ao carregar preços.";
    }
  }
  setInterval(atualizarCripto, 300000); // 5 minutos
  atualizarCripto();

  // Avatar reativo (exemplo simples)
  function animarAvatar(evento){
    const avatar = document.getElementById("avatar");
    if(evento==="gol"){ avatar.style.border="3px solid green"; }
    if(evento==="amarelo"){ avatar.style.border="3px solid yellow"; }
    if(evento==="vermelho"){ avatar.style.border="3px solid red"; }
    setTimeout(()=>{ avatar.style.border="none"; },2000);
  }

  // FCM (notificações push)
  const messaging = firebase.messaging();
  messaging.getToken({ vapidKey: "SUA_VAPID_KEY" }).then(token=>{
    console.log("Token FCM:", token);
  });
</script>
</body>
</html>
