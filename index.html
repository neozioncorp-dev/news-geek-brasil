<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>News Geek Brasil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
  <style>
    body {margin:0;font-family:Arial,sans-serif;background:#000;color:#fff;}
    header {text-align:center;padding:20px;background:#111;color:#0ff;font-size:24px;font-weight:bold;}
    .btn {display:block;width:90%;margin:15px auto;padding:20px;font-size:20px;color:#fff;border:none;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.5);cursor:pointer;}
    .btn-games {background:linear-gradient(#1e90ff,#104e8b);}
    .btn-filmes {background:linear-gradient(#ff4500,#8b2500);}
    .btn-series {background:linear-gradient(#32cd32,#006400);}
    .btn-futebol {background:linear-gradient(#ffd700,#b8860b);}
    .btn-cripto {background:linear-gradient(#ffa500,#ff8c00);}
    .btn-trailers {background:linear-gradient(#9370db,#4b0082);}
    .section {padding:20px;}
    .ticker {background:#ffa500;color:#000;overflow:hidden;white-space:nowrap;}
    .ticker span {display:inline-block;padding-right:50px;animation:scroll 30s linear infinite;}
    @keyframes scroll {from{transform:translateX(100%);}to{transform:translateX(-100%);}}
    .config {background:#d3d3d3;color:#549F78;padding:20px;}
    .config a {color:#0ff;text-decoration:none;}
  </style>
</head>
<body>
  <header>NEWS GEEK BRASIL</header>

  <!-- Botões principais -->
  <button class="btn btn-games"><i class="fa-solid fa-gamepad"></i> Games</button>
  <button class="btn btn-filmes"><i class="fa-solid fa-film"></i> Filmes</button>
  <button class="btn btn-series"><i class="fa-solid fa-tv"></i> Séries & Animes</button>
  <button class="btn btn-futebol"><i class="fa-solid fa-futbol"></i> Futebol</button>
  <button class="btn btn-cripto"><i class="fa-brands fa-bitcoin"></i> Criptomoedas</button>
  <button class="btn btn-trailers"><i class="fa-solid fa-video"></i> Trailers da Semana</button>

  <!-- Criptomoedas -->
  <div class="section" style="background:#ffa500;color:#000;">
    <h2>Criptomoedas</h2>
    <div class="ticker" id="cryptoTicker"><span>Carregando preços...</span></div>
    <div id="crypto-news">
      <marquee direction="up" scrollamount="2" height="200" id="cryptoFeed">
        <p>Carregando notícias...</p>
      </marquee>
    </div>
  </div>

  <!-- Configurações -->
  <div class="config">
    <h2>Configurações</h2>
    <p><input type="checkbox" checked> Dark Mode</p>
    <p><input type="checkbox" checked> Notificações internas</p>
    <p><button>Trocar Avatar</button></p>
    <p><button>Trocar Time Favorito</button></p>
    <p>Política de Privacidade: <a href="https://drive.google.com/drive/folders/1IsfjqpfKfHM3XjzNi1pQMoX5PideW9Iq" target="_blank">Ver documento completo</a></p>
    <p>Contato: neozion.corp@gmail.com</p>
    <p>Sobre nós</p>
  </div>

  <!-- Áudio de gol -->
  <audio id="golAudio" src="assets/audio/gol.mp3" preload="auto"></audio>

  <script>
    // Firebase config (placeholder)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);

    // Login Google
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then(result => {
        const user = result.user;
        console.log("Usuário logado:", user.displayName);
      });

    // Notificação de gol
    function notifyGol() {
      document.getElementById('golAudio').play();
      alert("GOOOOL do seu time!");
    }

    // Conteúdo dinâmico: Criptomoedas via CoinGecko
    async function loadCrypto() {
      try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,cardano,dogecoin&vs_currencies=usd");
        const data = await res.json();
        document.getElementById("cryptoTicker").innerHTML =
          `<span>BTC: $${data.bitcoin.usd} | ETH: $${data.ethereum.usd} | ADA: $${data.cardano.usd} | DOGE: $${data.dogecoin.usd}</span>`;
      } catch(e) {
        console.error("Erro ao carregar preços", e);
      }
    }
    loadCrypto();
    setInterval(loadCrypto, 300000); // Atualiza a cada 5 min

    // Conteúdo dinâmico: Notícias via Google News RSS
    async function loadNews() {
      try {
        const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt");
        const json = await res.json();
        let html = "";
        json.items.slice(0,8).forEach(a => {
          html += `<p><img src="${a.enclosure?.link || 'https://via.placeholder.com/50'}" width="50"> ${a.title}</p>`;
        });
        document.getElementById("cryptoFeed").innerHTML = html;
      } catch(e) {
        console.error("Erro ao carregar notícias", e);
      }
    }
    loadNews();
  </script>
</body>
</html>
